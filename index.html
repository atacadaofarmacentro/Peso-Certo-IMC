<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peso Certo - Atacadão Farma Centro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Poppins', system-ui, sans-serif; }
        .hero { background: linear-gradient(135deg, #10b981, #059669); }
    </style>
</head>
<body class="bg-gray-50">

    <div class="hero text-white py-10 text-center">
        <div class="max-w-md mx-auto px-6">
            <div class="flex justify-center mb-3">
                <div class="bg-white text-4xl w-16 h-16 rounded-2xl flex items-center justify-center shadow">⚖️</div>
            </div>
            <h1 class="text-4xl font-bold">Peso Certo</h1>
            <p class="text-xl mt-1">Atacadão Farma Centro</p>
            <p class="mt-3 text-emerald-100">Descubra se seu peso está ideal e conheça nossas soluções!</p>
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-6">
        <div class="bg-white rounded-3xl shadow-xl p-8">
            
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Altura (cm)</label>
                    <div class="relative">
                        <input type="number" id="altura" placeholder="170" 
                               class="w-full bg-gray-100 border border-gray-300 focus:border-emerald-500 rounded-2xl px-5 py-6 text-3xl font-semibold text-center outline-none">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400">cm</span>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Peso (kg)</label>
                    <div class="relative">
                        <input type="number" id="peso" placeholder="70" step="0.1"
                               class="w-full bg-gray-100 border border-gray-300 focus:border-emerald-500 rounded-2xl px-5 py-6 text-3xl font-semibold text-center outline-none">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400">kg</span>
                    </div>
                </div>
            </div>

            <button onclick="calcularIMC()" 
                    class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 transition-all text-white font-bold text-xl py-6 rounded-3xl flex items-center justify-center gap-2 shadow-lg">
                <span>💡 CALCULAR AGORA</span>
            </button>
        </div>

        <!-- RESULTADO -->
        <div id="resultado" class="hidden mt-8 bg-white rounded-3xl shadow-xl p-8 text-center">
            <div id="imcValue" class="text-7xl font-bold text-emerald-600"></div>
            <div id="status" class="text-2xl font-semibold mt-2 mb-4"></div>
            <div id="mensagem" class="text-gray-700 leading-relaxed"></div>

            <div id="contato" class="mt-8 hidden">
                <a onclick="abrirWhatsApp()" 
                   class="block bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-lg py-5 rounded-3xl cursor-pointer transition-all">
                    📲 Falar com Atacadão Farma Centro
                </a>
                <p class="text-xs text-gray-500 mt-4">Temos opções para emagrecer e engordar com qualidade!</p>
            </div>
        </div>
    </div>

    <script>
        function calcularIMC() {
            const alturaCm = parseFloat(document.getElementById('altura').value);
            const pesoKg = parseFloat(document.getElementById('peso').value);
            
            if (!alturaCm || !pesoKg || alturaCm < 50 || pesoKg < 2) {
                alert("⚠️ Por favor, preencha altura (em cm) e peso corretamente.\nExemplo: 170 cm e 70 kg");
                return;
            }

            const alturaM = alturaCm / 100;
            const imc = (pesoKg / (alturaM * alturaM)).toFixed(1);

            const resultado = document.getElementById('resultado');
            resultado.classList.remove('hidden');
            resultado.scrollIntoView({ behavior: "smooth" });

            document.getElementById('imcValue').textContent = imc;

            const status = document.getElementById('status');
            const mensagem = document.getElementById('mensagem');
            const contato = document.getElementById('contato');

            if (imc < 18.5) {
                status.innerHTML = '🟠 Abaixo do peso';
                mensagem.innerHTML = 'Seu peso está abaixo do ideal.<br><strong>Quer ganhar massa de forma saudável?</strong>';
                contato.classList.remove('hidden');
            } 
            else if (imc <= 24.9) {
                status.innerHTML = '🟢 Peso ideal!';
                mensagem.innerHTML = 'Parabéns! Seu peso está perfeito.<br>Continue assim 💪';
                contato.classList.add('hidden');
            } 
            else if (imc <= 29.9) {
                status.innerHTML = '🟡 Sobrepeso';
                mensagem.innerHTML = 'Seu peso está um pouco acima.<br><strong>Quer emagrecer com saúde?</strong>';
                contato.classList.remove('hidden');
            } 
            else {
                status.innerHTML = '🔴 Obesidade';
                mensagem.innerHTML = 'Seu IMC indica obesidade.<br><strong>Vamos te ajudar a emagrecer com segurança!</strong>';
                contato.classList.remove('hidden');
            }
        }

        function abrirWhatsApp() {
            const numero = "SEU_NUMERO_AQUI"; // ← Troque pelo seu WhatsApp com DDD (ex: 5561998765432)
            const texto = encodeURIComponent("Olá! Usei o app Peso Certo e meu IMC não está ideal. Quero saber as opções de emagrecimento ou ganho de peso.");
            window.open(`https://wa.me/${numero}?text=${texto}`, '_blank');
        }

        // Pressionar Enter calcula
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calcularIMC();
        });
    </script>
</body>
</html>
