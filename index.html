<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peso Certo - Atacadão Farma Centro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Poppins', system-ui, sans-serif; 
        }
        .hero { 
            background: linear-gradient(135deg, #dc2626, #b91c1c, #991b1b); 
        }
        .btn-red { 
            background: #dc2626; 
        }
        .btn-red:hover { 
            background: #b91c1c; 
        }
        .number-input {
            display: flex;
            align-items: center;
            background: #f3f4f6;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
        }
        .number-input input {
            flex: 1;
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            background: transparent;
            border: none;
            outline: none;
        }
        .number-btn {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: bold;
            color: #dc2626;
            background: white;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .number-btn:hover {
            background: #fee2e9;
            color: #b91c1c;
        }
        .logo {
            max-height: 120px;
            filter: drop-shadow(0 15px 20px rgba(220, 38, 38, 0.4));
        }
    </style>
</head>
<body class="bg-gray-50">

    <div class="hero text-white py-14 text-center">
        <div class="max-w-md mx-auto px-6">
            <!-- Logo -->
            <div class="flex justify-center mb-5">
                <img src="https://raw.githubusercontent.com/atacadaofarmacentro/Peso-Certo-IMC/main/imagens/atacadao.png" 
                     alt="Atacadão Farma Centro" 
                     class="logo">
            </div>

            <h1 class="text-5xl font-bold tracking-tight">Peso Certo</h1>
            <p class="text-2xl mt-2 font-semibold">Atacadão Farma Centro</p>
            <p class="mt-5 text-red-100 text-lg">Descubra se seu peso está ideal e conheça nossas soluções!</p>
        </div>
    </div>

    <div class="max-w-md mx-auto px-6 -mt-8">
        <div class="bg-white rounded-3xl shadow-2xl p-8">
            
            <!-- Altura -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-600 mb-2">Altura (cm)</label>
                <div class="number-input">
                    <button onclick="mudarValor('altura', -1)" class="number-btn">-</button>
                    <input type="number" id="altura" value="170" min="50" max="250">
                    <button onclick="mudarValor('altura', 1)" class="number-btn">+</button>
                </div>
            </div>

            <!-- Peso -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-gray-600 mb-2">Peso (kg)</label>
                <div class="number-input">
                    <button onclick="mudarValor('peso', -0.5)" class="number-btn">-</button>
                    <input type="number" id="peso" value="70" min="2" max="300" step="0.1">
                    <button onclick="mudarValor('peso', 0.5)" class="number-btn">+</button>
                </div>
            </div>

            <button onclick="calcularIMC()" 
                    class="mt-4 w-full btn-red text-white font-bold text-xl py-6 rounded-3xl flex items-center justify-center gap-3 shadow-lg">
                💡 CALCULAR AGORA
            </button>
        </div>

        <!-- RESULTADO -->
        <div id="resultado" class="hidden mt-8 bg-white rounded-3xl shadow-2xl p-8 text-center">
            <div id="imcValue" class="text-7xl font-bold text-rose-600"></div>
            <div id="status" class="text-2xl font-semibold mt-3 mb-5"></div>
            <div id="mensagem" class="text-gray-700 text-lg leading-relaxed"></div>

            <div id="contato" class="mt-8 hidden">
                <a onclick="abrirWhatsApp()" 
                   class="block btn-red text-white font-semibold text-xl py-6 rounded-3xl cursor-pointer shadow-lg">
                    📲 (61) 99218-6067 - Falar agora
                </a>
                <p class="text-xs text-gray-500 mt-4">Temos opções para emagrecer e engordar com qualidade!</p>
            </div>
        </div>
    </div>

    <script>
        function mudarValor(id, valor) {
            const input = document.getElementById(id);
            let atual = parseFloat(input.value) || 0;
            atual += valor;
            
            if (id === 'altura') {
                if (atual < 50) atual = 50;
                if (atual > 250) atual = 250;
            } else if (id === 'peso') {
                if (atual < 2) atual = 2;
                if (atual > 300) atual = 300;
            }
            
            input.value = atual;
        }

        function calcularIMC() {
            const alturaCm = parseFloat(document.getElementById('altura').value);
            const pesoKg = parseFloat(document.getElementById('peso').value);
            
            if (!alturaCm || !pesoKg || alturaCm < 50 || pesoKg < 2) {
                alert("⚠️ Preencha altura e peso corretamente.");
                return;
            }

            const alturaM = alturaCm / 100;
            const imc = (pesoKg / (alturaM * alturaM)).toFixed(1);

            const resultado = document.getElementById('resultado');
            resultado.classList.remove('hidden');
            resultado.scrollIntoView({ behavior: "smooth" });

            document.getElementById('imcValue').textContent = imc;

            const status = document.getElementById('status');
            const mensagem = document.getElementById('mensagem');
            const contato = document.getElementById('contato');

            if (imc < 18.5) {
                status.innerHTML = '<span class="text-orange-600">🟠 Abaixo do peso</span>';
                mensagem.innerHTML = 'Seu peso está abaixo do ideal.<br><strong>Quer ganhar massa saudável?</strong>';
                contato.classList.remove('hidden');
            } else if (imc <= 24.9) {
                status.innerHTML = '<span class="text-emerald-600">🟢 Peso ideal!</span>';
                mensagem.innerHTML = 'Parabéns! Seu peso está perfeito.<br>Continue assim 💪';
                contato.classList.add('hidden');
            } else if (imc <= 29.9) {
                status.innerHTML = '<span class="text-amber-600">🟡 Sobrepeso</span>';
                mensagem.innerHTML = 'Seu peso está um pouco acima.<br><strong>Quer emagrecer com saúde?</strong>';
                contato.classList.remove('hidden');
            } else {
                status.innerHTML = '<span class="text-red-600">🔴 Obesidade</span>';
                mensagem.innerHTML = 'Seu IMC indica obesidade.<br><strong>Vamos te ajudar a emagrecer com segurança!</strong>';
                contato.classList.remove('hidden');
            }
        }

        function abrirWhatsApp() {
            const numero = "5561992186067";
            const texto = encodeURIComponent("Olá! Usei o app Peso Certo do Atacadão Farma Centro e quero saber mais sobre as opções.");
            window.open(`https://wa.me/${numero}?text=${texto}`, '_blank');
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calcularIMC();
        });
    </script>
</body>
</html>
